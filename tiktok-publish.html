<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publication TikTok - CCL Beats For Peace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #b0b0b0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #e0e0e0;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff0050;
            background: rgba(255, 255, 255, 0.08);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        select option {
            background: #1a1a1a;
            color: white;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #ff0050, #00f2ea);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 0, 80, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #ff0050;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .message.success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #4caf50;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #f44336;
        }

        .preview {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview-title {
            font-size: 12px;
            color: #b0b0b0;
            margin-bottom: 8px;
        }

        .preview-content {
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.4;
        }

        /* Personnalisation moderne du bouton */
        .custom-file-upload {
            display: inline-block;
            padding: 12px 20px;
            background: linear-gradient(45deg, #ff0050, #00f2ea);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            font-size: 16px;
        }

        .custom-file-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 0, 80, 0.3);
        }

        input[type="file"]::file-selector-button {
            border: 2px solid #6c5ce7;
            padding: .2em .4em;
            border-radius: .2em;
            background-color: #a29bfe;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">TikTok</div>
            <h1>Publication CCL Beats For Peace</h1>
            <p class="subtitle">Publiez la vidéo d'un artiste validé sur TikTok</p>
        </div>

        <form id="tiktokForm">
            <div class="form-group">
                <label for="artisteId">ID de l'artiste *</label>
                <input type="number" id="artisteId" name="artisteId" required placeholder="Ex: 1">
            </div>

            <div class="form-group">
                <label for="file-upload">Vidéo *</label>
                <label for="file-upload" class="custom-file-upload">
                    <input id="file-upload" type="file" style="display:none;" accept="video/*"/>
                    Télécharger un fichier
                </label>
                <input type="hidden" id="videoUrl" name="videoUrl">
            </div>

            <div class="form-group">
                <label for="caption">Légende (caption)</label>
                <textarea id="caption" name="caption" placeholder="Décrivez la vidéo de l'artiste..."></textarea>
            </div>

            <div class="form-group">
                <label for="hashtags">Hashtags additionnels</label>
                <input type="text" id="hashtags" name="hashtags" placeholder="#beats #music #ccl">
            </div>

            <div class="preview">
                <div class="preview-title">Aperçu de la publication:</div>
                <div class="preview-content" id="previewContent">
                    #CCLBeatsForPeace
                </div>
            </div>

            <button type="submit" class="btn" id="publishBtn">
                Publier sur TikTok
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Publication en cours...</p>
            </div>

            <div class="message" id="message"></div>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3001/api';
        
        const form = document.getElementById('tiktokForm');
        const publishBtn = document.getElementById('publishBtn');
        const loading = document.getElementById('loading');
        const message = document.getElementById('message');
        const previewContent = document.getElementById('previewContent');

        // Mettre à jour l'aperçu en temps réel
        function updatePreview() {
            const caption = document.getElementById('caption').value;
            const hashtags = document.getElementById('hashtags').value;
            const officialHashtag = '#CCLBeatsForPeace';
            
            let preview = officialHashtag;
            
            if (hashtags) {
                const cleanHashtags = hashtags.startsWith('#') ? hashtags : '#' + hashtags.replace(/\s+/g, ' #');
                if (!cleanHashtags.includes(officialHashtag)) {
                    preview = `${cleanHashtags} ${officialHashtag}`;
                } else {
                    preview = cleanHashtags;
                }
            }
            
            if (caption) {
                preview = `${caption}\n\n${preview}`;
            }
            
            previewContent.textContent = preview;
        }

        document.getElementById('caption').addEventListener('input', updatePreview);
        document.getElementById('hashtags').addEventListener('input', updatePreview);

        // Gérer la soumission du formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const videoFile = document.getElementById('file-upload').files[0];
            const artisteId = parseInt(document.getElementById('artisteId').value);
            const caption = document.getElementById('caption').value;
            const hashtags = document.getElementById('hashtags').value;

            // Validation
            if (!artisteId || !videoFile) {
                showMessage('Veuillez remplir tous les champs obligatoires', 'error');
                return;
            }

            try {
                // Afficher le chargement
                publishBtn.disabled = true;
                loading.style.display = 'block';
                message.style.display = 'none';

                // Convertir le fichier vidéo en base64
                const videoBase64 = await fileToBase64(videoFile);
                
                const data = {
                    artisteId: artisteId,
                    videoUrl: videoBase64,
                    caption: caption || '',
                    hashtags: hashtags || ''
                };

                // Appel API sans authentification
                const response = await fetch(`${API_BASE_URL}/tiktok/publish-direct`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showMessage(`✅ ${result.message}`, 'success');
                    form.reset();
                    updatePreview();
                    
                    // Afficher les détails de la publication
                    console.log('Publication créée:', result.data);
                } else {
                    showMessage(`❌ ${result.message}`, 'error');
                }

            } catch (error) {
                console.error('Erreur:', error);
                showMessage('❌ Erreur de connexion au serveur', 'error');
            } finally {
                publishBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Convertir un fichier en base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
        }

        // Initialiser l'aperçu
        updatePreview();
    </script>
</body>
</html>
